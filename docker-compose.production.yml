services:
  postgres:
    image: postgres:16-alpine
    container_name: limi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: limi-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: limi-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE}
      NODE_ENV: production
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      BANK_TRANSFER_ACCOUNT_NAME: ${BANK_TRANSFER_ACCOUNT_NAME}
      BANK_TRANSFER_BANK_NAME: ${BANK_TRANSFER_BANK_NAME}
      BANK_TRANSFER_IBAN: ${BANK_TRANSFER_IBAN}
      BANK_TRANSFER_SWIFT: ${BANK_TRANSFER_SWIFT}
      BANK_TRANSFER_REFERENCE_PREFIX: ${BANK_TRANSFER_REFERENCE_PREFIX}
      MEDUSA_ADMIN_HTTPS: ${MEDUSA_ADMIN_HTTPS}
      RUN_SEED_ON_BOOT: ${RUN_SEED_ON_BOOT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9000/').then((r)=>process.exit(r.status===404?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    expose:
      - "9000"
    networks:
      - internal
      - edge

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL}
    container_name: limi-storefront
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL}
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL}
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
      MEDUSA_WAIT_TIMEOUT_SECONDS: ${MEDUSA_WAIT_TIMEOUT_SECONDS}
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - internal
      - edge

  caddy:
    image: caddy:2-alpine
    container_name: limi-caddy
    restart: unless-stopped
    environment:
      STORE_DOMAIN: ${STORE_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    depends_on:
      - storefront
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge

networks:
  internal:
  edge:

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
