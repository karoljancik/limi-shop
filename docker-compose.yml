services:
  postgres:
    image: postgres:16-alpine
    container_name: limi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: limi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d limi"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: limi-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: limi-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/limi?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - STORE_CORS=http://localhost:3000
      - ADMIN_CORS=http://localhost:9000,http://localhost:7001
      - AUTH_CORS=http://localhost:3000,http://localhost:9000
      - JWT_SECRET=supersecret
      - COOKIE_SECRET=supersecret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:9000/').then((r)=>process.exit(r.status===404?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "9000:9000"

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://localhost:9000
    container_name: limi-storefront
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://localhost:9000
      - MEDUSA_BACKEND_URL=http://backend:9000
      - NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=pk_0e26b4584834db164e3cc6fd0d4959a9a03895dd543ea80757a8bad267591c18
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
